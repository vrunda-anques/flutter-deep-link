<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>
  <script>
    const path = window.location.pathname;

    const systemPaths = [
      '/apple-app-site-association',
      '/.well-known/apple-app-site-association',
      '/.well-known/assetlinks.json',
      '/well-known/assetlinks.json',
    ];

    if (systemPaths.some(p => path.includes(p))) {
      document.body.innerHTML = 'Not found';
    } else {
      setTimeout(() => {
        window.location.replace("https://play.google.com/store/apps/details?id=com.bizzbrains.junior");
      }, 300);
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
